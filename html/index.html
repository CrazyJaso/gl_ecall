<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>gl_ecall</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div id="ecall" class="hidden">

        <div class="header">

            <div class="icon">
                🚑
            </div>

            <div class="titles">
                <h1>Automatischer eCall</h1>
                <p>Schwerer Verkehrsunfall erkannt</p>
            </div>

        </div>

        <div class="content">

            <div class="vehicleBox">

                <div class="row">
                    <span>Fahrzeug</span>
                    <strong id="vehicle">Unbekannt</strong>
                </div>

                <div class="row">
                    <span>Kennzeichen</span>
                    <strong id="plate">-----</strong>
                </div>

            </div>

            <div class="progressWrapper">

                <svg width="170" height="170">

                    <circle
                        class="backgroundCircle"
                        cx="85"
                        cy="85"
                        r="70">
                    </circle>

                    <circle
                        id="progressCircle"
                        class="progressCircle"
                        cx="85"
                        cy="85"
                        r="70">
                    </circle>

                </svg>

                <div class="countNumber">
                    <span id="time">10</span>
                </div>

            </div>

            <div class="status" id="status">
                Automatischer Notruf wird vorbereitet...
            </div>

            <div class="cancel">
                Drücke <b>G</b>, um den Notruf abzubrechen
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
